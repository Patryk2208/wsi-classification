# Data split
test_size: 0.2
random_state: 123456

# Missing values
missing_threshold: 0.5  # Drop columns with >50% missing
categorical_missing_method: mode  # mode or constant
numerical_missing_method: median    # median or mean

# Outliers
outlier_method: cap     # cap, later: remove, or ignore
outlier_threshold: 1.5  # IQR multiplier

# Encoding
binary_encoding: label  # label
categorical_encoding: onehot  # onehot, later: target
max_onehot_unique_count: 20  # Use one-hot if less than this, else target encoding

# Scaling
scaling_method: standard    # standard, minmax, robust, or none

# Target column
target_column: growth direction  # Name of the target column

# Models
models: [] #[RandomForest, GradientBoosting]

use_stacking: True
stacking_estimators: [RandomForest, GradientBoosting]
stacking_final_estimator: LogisticRegression

# Evaluation metrics
scoring_methods: [accuracy, precision, recall, f1, confusion_matrix, roc_auc]

# Hyperparameter tuning
tuning_methods: [CrossValidation] #[None, CrossValidation, GridSearch]
cv_folds: 5
cv_scoring_method: accuracy

grid_search_scoring_method: accuracy
grid_search_repeats: 10
# model-specific parameters for Grid Search
grid_search_params:
  LogisticRegression:
    param_grid:
      C: [0.01, 0.1, 1, 10, 20]
      solver: ['lbfgs', 'saga', 'newton-cg']
      max_iter: [1000]

  DecisionTreeClassifier:
    param_grid:
      max_depth: [ 5, 10, 15, 20 ]
      min_samples_split: [ 2, 5, 10 ]
      min_samples_leaf: [ 1, 2, 4 ]
      criterion: [ 'gini', 'entropy' ]

  SVC:
    param_grid:
      C: [0.1, 1, 2, 5]
      gamma: ['scale', auto, 0.01, 0.1, 1]
      kernel: ['rbf']
      class_weight: ['balanced']

  KNeighborsClassifier:
    param_grid:
      n_neighbors: [5, 10]
      weights: ['uniform', 'distance']
      metric: ['euclidean']

  GaussianNB:
    param_grid:
      var_smoothing: [1, 10, 1000]

  RandomForestClassifier:
    param_grid:
      n_estimators: [ 150, 200, 250 ]
      max_depth: [ 8, 10, 12 ]
      min_samples_split: [ 5, 7, 10 ]
      min_samples_leaf: [ 3, 5 ]
      max_features: [ 'sqrt' ]

  GradientBoostingClassifier:
    param_grid:
      n_estimators: [ 200 ]
      learning_rate: [ 0.01, 0.03, 0.05 ]
      max_depth: [ 3, 5 ]
      min_samples_split: [ 5 ]
      subsample: [ 0.8 ]

  StackingClassifier:
    param_grid:
      final_estimator__C: [ 0.1 ]
      stack_method: [ 'predict_proba' ]



